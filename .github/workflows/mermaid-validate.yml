name: Mermaid Validation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**/*.md'
  pull_request:
    paths:
      - 'docs/**/*.md'

jobs:
  validate-mermaid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install @probelabs/maid
        run: npm install -D @probelabs/maid

      - name: Validate Mermaid diagrams
        run: |
          echo "Validating Mermaid diagrams in markdown files..."
          
          # Find all markdown files with mermaid blocks
          find docs -name "*.md" -exec grep -l '```mermaid' {} \; | while read -r file; do
            echo "Validating: $file"
            npx @probelabs/maid "$file" || exit 1
          done
          
          echo "All Mermaid diagrams validated successfully!"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existingComment = comments.find(c => 
              c.user.type === 'Bot' && c.body.includes('Mermaid Validation')
            );
            
            if (existingComment) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
              });
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ **Mermaid Validation** - All diagrams validated successfully!',
            });