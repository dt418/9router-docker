# lefthook.yml - Git hooks managed by lefthook
# https://github.com/evilmartians/lefthook

# Commit-msg hook: validate commit message with commitlint
commit-msg:
  commands:
    commitlint:
      run: npx --no-install commitlint --edit {1}

# Post-commit hook: auto-docs for important commits
post-commit:
  commands:
    auto-docs:
      run: node scripts/git-hooks/post-commit.js

# Post-merge: auto-install dependencies when package-lock changes
post-merge:
  commands:
    install:
      run: |
        if git diff HEAD@{1} HEAD --name-only | grep -q "package-lock.json"; then
          npm install --prefer-offline
        fi
