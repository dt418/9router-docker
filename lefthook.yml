# lefthook.yml - Git hooks managed by lefthook
# https://github.com/evilmartians/lefthook

# Pre-commit hook: lint staged files
pre-commit:
  parallel: true
  commands:
    lint-staged:
      glob: "*.{js,jsx,mjs}"
      run: |
        echo "Linting staged JavaScript/JSX files with ESLint..."
        npx eslint --no-warn-ignored --no-cache {staged_files}
        echo "ESLint linting completed."
    mermaid-check:
      glob: "docs/**/*.md"
      run: |
        echo "Validating Mermaid diagrams in staged Markdown files..."
        npx mmdc -i {staged_files}
        echo "Mermaid validation completed."

# Commit-msg hook: validate commit message with commitlint
commit-msg:
  commands:
    commitlint:
      run: npx --no-install commitlint --edit {1}

# Post-commit hook: auto-docs for important commits
post-commit:
  commands:
    auto-docs:
      run: node scripts/git-hooks/post-commit.js

# Post-merge: auto-install dependencies when package-lock changes
post-merge:
  commands:
    install:
      run: |
        if git diff HEAD@{1} HEAD --name-only | grep -q "package-lock.json"; then
          npm install --prefer-offline
        fi
